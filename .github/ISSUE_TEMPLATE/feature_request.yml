name: Feature request
description: Suggest an idea for stubllm
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that stubllm doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought of?
