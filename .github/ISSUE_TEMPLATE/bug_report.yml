name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Minimal example
      render: python
    validations:
      required: true

  - type: input
    id: stubllm-version
    attributes:
      label: stubllm version
      placeholder: "e.g. 0.1.5"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenAI
        - Anthropic
        - Google Gemini
        - All / Not applicable
    validations:
      required: true
